# Contact360 DocsAI Admin — Nginx configuration
# Server: 34.201.10.84 / admin.contact360.io

upstream docsai_admin {
    server docsai-admin:8000;
}

server {
    listen 80;
    server_name admin.contact360.io 34.201.10.84;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "same-origin";

    # Static files served directly by Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Favicon
    location = /favicon.ico {
        alias /app/staticfiles/admin/images/favicon.png;
        access_log off;
    }

    # Proxy to Django
    location / {
        proxy_pass http://docsai_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        proxy_buffers 16 64k;
        proxy_buffer_size 128k;
        client_max_body_size 50m;
    }
}

