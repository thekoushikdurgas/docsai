# Deploy DocsAI (Django admin) to EC2 — monorepo entrypoint.
# Secrets: EC2_SSH_PRIVATE_KEY, EC2_HOST, EC2_USER
# Variable EC2_PROJECT_DIR: path on EC2 to the directory containing deploy/remote-deploy.sh
#   (e.g. /home/ubuntu/contact360/contact360.io/admin for a full monorepo clone)
# Standalone admin repo: use contact360.io/admin/.github/workflows/deploy.yml and default PROJECT_DIR.

name: Deploy Admin to EC2

on:
  push:
    branches: [main]
    paths:
      - "contact360.io/admin/**"
      - ".github/workflows/admin-deploy-ec2.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        type: string
        required: false
        default: "main"

env:
  PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR || '/home/ubuntu/docsai' }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BRANCH: ${{ github.event.inputs.branch || (github.event_name == 'push' && github.ref_name) || 'main' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes "$EC2_USER@$EC2_HOST" \
            "set -e && cd '${{ env.PROJECT_DIR }}' && if [ ! -d .git ]; then echo '::error::Not a git repository at ${{ env.PROJECT_DIR }}. Clone the repo so this path contains .git and deploy/remote-deploy.sh; for monorepo, set EC2_PROJECT_DIR to contact360.io/admin inside the clone.'; exit 128; fi && git fetch origin && git reset --hard origin/$BRANCH && bash deploy/remote-deploy.sh"

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes "$EC2_USER@$EC2_HOST" \
            "curl -sf --connect-timeout 15 'http://127.0.0.1/api/v1/health/'"
