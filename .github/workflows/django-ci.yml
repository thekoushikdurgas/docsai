# Monorepo: expects checkout root to contain contact360.io/admin (see working-directory).
# Standalone admin repo at project root: remove `defaults.run.working-directory` below.
name: Django CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: contact360.io/admin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django system check (deploy)
        env:
          DJANGO_ENV: production
          SECRET_KEY: ci-placeholder-secret-key-at-least-32-chars-long
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check --deploy
      - name: Pytest
        env:
          DJANGO_ENV: testing
        run: python -m pytest apps/core/tests/ -q
