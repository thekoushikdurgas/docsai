# Deploy DocsAI (Django admin) to EC2
# Secrets: EC2_SSH_PRIVATE_KEY, EC2_HOST, EC2_USER
# Optional repo variable: EC2_PROJECT_DIR — absolute path on the server where the repo is cloned (default /home/ubuntu/docsai).
# EC2 must be a git clone: ssh ubuntu@host "cd $PATH && git status". If you see "not a git repository", clone: git clone <url> $PATH
# Monorepo: changes under contact360.io/admin/**. Standalone (e.g. docsai): paths below include apps/**, manage.py, etc.

name: Deploy Admin to EC2

on:
  push:
    branches: [main]
    paths:
      - "contact360.io/admin/**"
      # Standalone admin repo (manage.py at root; no contact360.io/ prefix)
      - "apps/**"
      - "config/**"
      - "requirements.txt"
      - "manage.py"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        type: string
        required: false
        default: "main"

env:
  # Repository → Settings → Variables → EC2_PROJECT_DIR (optional absolute path on EC2)
  PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR || '/home/ubuntu/docsai' }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BRANCH: ${{ github.event.inputs.branch || (github.event_name == 'push' && github.ref_name) || 'main' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes "$EC2_USER@$EC2_HOST" \
            "set -e && cd '${{ env.PROJECT_DIR }}' && if [ ! -d .git ]; then echo '::error::Not a git repository at ${{ env.PROJECT_DIR }}. On EC2: git clone https://github.com/${{ github.repository }}.git . (or set repo variable EC2_PROJECT_DIR to your clone path).'; exit 128; fi && git fetch origin && git reset --hard origin/$BRANCH && bash deploy/remote-deploy.sh"

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          sleep 5
          # Curl from inside EC2 to 127.0.0.1 avoids ALLOWED_HOSTS rejecting the public IP / elastic IP.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes "$EC2_USER@$EC2_HOST" \
            "curl -sf --connect-timeout 15 'http://127.0.0.1/api/v1/health/'"

            