# Use when contact360.io/admin is the Git repository root.
# Monorepo: repo root .github/workflows/deploy-contact360-admin.yml

name: Deploy Contact360 Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH (PM2 + deploy/ec2-github-deploy.sh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 40m
          script: |
            set -e
            ADMIN_DIR="${{ vars.EC2_ADMIN_PATH }}"
            if [ -z "$ADMIN_DIR" ]; then ADMIN_DIR="$HOME/contact360-admin"; fi
            cd "$ADMIN_DIR"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            {
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
              echo "NEXT_PUBLIC_GRAPHQL_URL=${{ secrets.NEXT_PUBLIC_GRAPHQL_URL }}"
              echo "PORT=3001"
            } > .env.production
            chmod 600 .env.production
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            bash deploy/ec2-github-deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            curl -sf --connect-timeout 15 http://127.0.0.1:3001/login || exit 1
