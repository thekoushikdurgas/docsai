version: "3.9"

services:
  docsai-admin:
    build: .
    container_name: docsai_admin
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - contact360_network

  nginx:
    image: nginx:1.25-alpine
    container_name: docsai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - docsai-admin
    networks:
      - contact360_network

volumes:
  static_volume:
  media_volume:

networks:
  contact360_network:
    external: true
