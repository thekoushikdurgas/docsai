{% extends "base.html" %} {% block title %}Import collection{% endblock %} {%
block content %}
<div class="page-header">
  <h1 class="page-title">Import Postman collection</h1>
</div>
{% include "components/alert.html" with type="info" message="POST JSON to a
future import endpoint; this page is a placeholder." %}
<form
  method="post"
  enctype="multipart/form-data"
  class="card card-body"
  style="max-width: 520px"
>
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label">Collection JSON</label>
    <input type="file" name="file" accept=".json" class="form-control" />
  </div>
  <button type="submit" class="btn btn-primary">Upload (stub)</button>
  <a href="{% url 'durgasman:dashboard' %}" class="btn btn-outline">Back</a>
</form>
{% endblock %}
