{% extends "base.html" %}
{% load static admin_tags %}
{% block title %}Workflows — Durgasflow{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Workflows</h1></div>
  <div class="page-actions">
    <a href="{% url 'durgasflow:editor_new' %}" class="btn btn-primary"><i class="lni lni-plus-circle"></i> New</a>
  </div>
</div>
<div class="card">
  <div class="table-wrap">
    <table class="table">
      <thead><tr><th>Name</th><th>Status</th><th>Last Run</th><th>Actions</th></tr></thead>
      <tbody>
        <tr><td colspan="4" class="table-empty">No workflows found. Create your first workflow.</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
