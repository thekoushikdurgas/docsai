{% extends "base.html" %}
{% block title %}Credential{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Credential</h1><p class="page-subtitle"><code>{{ credential_id }}</code></p></div>
  <form method="post" action="{% url 'durgasflow:credential_delete' credential_id=credential_id %}">{% csrf_token %}<button class="btn btn-danger btn-outline" type="submit">Delete</button></form>
</div>
{% include "components/alert.html" with type="info" message="Detail view stub." %}
{% endblock %}
