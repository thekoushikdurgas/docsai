{% extends "base.html" %} {% load static admin_tags %} {% block title %}New
Credential — Durgasflow{% endblock %} {% block extra_css %}
<link
  rel="stylesheet"
  href="{% static 'admin/css/components/durgasflow.css' %}"
/>
{% endblock %} {% block content %}
<div class="page-header">
  <div><h1 class="page-title">New Credential</h1></div>
  <div class="page-actions">
    <a href="{% url 'durgasflow:credential_list' %}" class="btn btn-outline"
      ><i class="lni lni-arrow-left"></i> Cancel</a
    >
  </div>
</div>
<div style="max-width: 480px; margin: 0 auto">
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            placeholder="My API Key"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select name="credential_type" class="form-control">
            <option value="api_key">API Key</option>
            <option value="bearer_token">Bearer Token</option>
            <option value="basic_auth">Basic Auth</option>
            <option value="oauth2">OAuth 2.0</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Service Name</label>
          <input
            type="text"
            name="service_name"
            class="form-control"
            placeholder="e.g. openai, slack"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Value / Key</label>
          <input
            type="password"
            name="data_value"
            class="form-control"
            placeholder="sk-…"
          />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%">
          <i class="lni lni-lock"></i> Save Credential
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
