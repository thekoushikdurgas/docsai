{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 900px; margin: 0 auto;">
  <h1>Billing Settings (UPI)</h1>

  {% if success %}
    <div style="padding: 12px; background: #ecfdf3; border: 1px solid #abefc6; border-radius: 8px; margin: 12px 0;">
      {{ success }}
    </div>
  {% endif %}

  {% if error %}
    <div style="padding: 12px; background: #fee; border: 1px solid #fbb; border-radius: 8px; margin: 12px 0;">
      {{ error }}
    </div>
  {% endif %}

  <form method="post" style="display: grid; gap: 14px; margin-top: 16px;">
    {% csrf_token %}
    <div style="display: grid; gap: 6px;">
      <label><strong>UPI ID</strong></label>
      <input type="text" name="upi_id" value="{{ settings.upiId|default:'' }}" placeholder="example@upi" />
    </div>

    <div style="display: grid; gap: 6px;">
      <label><strong>Phone Number</strong></label>
      <input type="text" name="phone_number" value="{{ settings.phoneNumber|default:'' }}" placeholder="+91..." />
    </div>

    <div style="display: grid; gap: 6px;">
      <label><strong>Email</strong></label>
      <input type="text" name="email" value="{{ settings.email|default:'' }}" placeholder="billing@company.com" />
    </div>

    <div style="display: grid; gap: 6px;">
      <label><strong>QR Code S3 Key (optional)</strong></label>
      <input type="text" name="qr_code_s3_key" value="{{ settings.qrCodeS3Key|default:'' }}" placeholder="s3 key for qr image" />
      <div style="font-size: 12px; opacity: 0.7;">
        Upload the QR image via existing Storage tooling, then paste the S3 key here.
      </div>
    </div>

    <div>
      <button type="submit">Save</button>
    </div>
  </form>
</div>
{% endblock %}
