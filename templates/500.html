{% load static %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>500 — Server Error | Contact360 Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Nunito:wght@400;600&display=swap"
    />
    <link rel="stylesheet" href="{% static 'admin/css/design-tokens.css' %}" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--c360-bg);
        font-family: var(--c360-font-primary);
        color: var(--c360-text);
        padding: var(--c360-spacing-8);
        text-align: center;
        gap: var(--c360-spacing-5);
        position: relative;
        overflow: hidden;
      }
      .watermark {
        position: absolute;
        font-size: 20rem;
        font-weight: var(--c360-font-bold);
        color: var(--c360-danger);
        opacity: 0.04;
        line-height: 1;
        user-select: none;
        pointer-events: none;
      }
      .icon-ring {
        width: 72px;
        height: 72px;
        border-radius: var(--c360-radius-full);
        background: var(--c360-danger-light);
        color: var(--c360-danger);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-ring svg {
        width: 28px;
        height: 28px;
      }
      h1 {
        font-size: var(--c360-text-2xl);
        font-weight: var(--c360-font-bold);
        margin-bottom: var(--c360-spacing-2);
      }
      p {
        font-size: var(--c360-text-sm);
        color: var(--c360-text-muted);
        max-width: 360px;
      }
      .actions {
        display: flex;
        gap: var(--c360-spacing-3);
        flex-wrap: wrap;
        justify-content: center;
        margin-top: var(--c360-spacing-2);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--c360-spacing-2);
        height: var(--c360-button-height);
        padding: 0 var(--c360-spacing-5);
        border-radius: var(--c360-radius-md);
        font-size: var(--c360-text-sm);
        font-weight: var(--c360-font-medium);
        text-decoration: none;
        border: none;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--c360-primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--c360-primary-hover);
      }
    </style>
  </head>
  <body>
    <div class="watermark" aria-hidden="true">500</div>

    <div class="icon-ring">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
        />
      </svg>
    </div>

    <div>
      <h1>Something went wrong</h1>
      <p>
        An unexpected server error occurred. Our team has been notified. Please
        try again in a moment.
      </p>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
          />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Back to Dashboard
      </a>
    </div>
  </body>
</html>
