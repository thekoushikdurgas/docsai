{% extends "base.html" %}
{% block title %}Edit knowledge{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">Edit</h1><p class="page-subtitle"><code>{{ knowledge_id }}</code></p></div>
<form method="post" class="card card-body" style="max-width:560px">{% csrf_token %}
  <div class="form-group"><label class="form-label">Title</label><input class="form-control" name="title" value="{{ item.title|default:'' }}"></div>
  <div class="form-group"><label class="form-label">Body</label><textarea class="form-control" name="body" rows="6">{{ item.body|default:'' }}</textarea></div>
  <button class="btn btn-primary" type="submit">Save (stub)</button>
  <a href="{% url 'knowledge:detail' knowledge_id=knowledge_id %}" class="btn btn-outline">Cancel</a>
</form>
{% endblock %}
