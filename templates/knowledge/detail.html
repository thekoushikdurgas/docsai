{% extends "base.html" %}
{% block title %}Knowledge {{ knowledge_id }}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Detail</h1>
    <p class="page-subtitle"><code>{{ knowledge_id }}</code></p>
  </div>
  <div class="page-actions">
    <a
      href="{% url 'knowledge:edit' knowledge_id=knowledge_id %}"
      class="btn btn-outline"
      >Edit</a
    >
    <form
      method="post"
      action="{% url 'knowledge:delete' knowledge_id=knowledge_id %}"
    >
      {% csrf_token %}<button class="btn btn-danger btn-outline" type="submit">
        Delete
      </button>
    </form>
  </div>
</div>
{% include "components/alert.html" with type="info" message="Load from GraphQL
when available." %} {% endblock %}
