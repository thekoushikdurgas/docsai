{% comment %}
  fields: iterable of {key, value} or dict passed as json_fields from view
{% endcomment %}
<div class="table-responsive">
  <table class="table table-striped table-sm table-borderless mb-0">
    <tbody>
      {% for row in fields %}
      <tr>
        <th scope="row" class="text-muted small" style="width: 32%;">{{ row.key }}</th>
        <td><pre class="mb-0 small bg-light p-2 rounded" style="white-space: pre-wrap; max-height: 200px; overflow: auto;">{{ row.value }}</pre></td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2" class="text-muted small">No fields</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
