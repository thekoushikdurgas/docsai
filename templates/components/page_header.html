{% comment %}
  title, subtitle (optional), actions block via {% include %} caller wrapping
{% endcomment %}
<div class="form-head d-flex mb-4 align-items-start flex-wrap">
  <div class="mr-auto mb-2 mb-md-0">
    <h2 class="text-black font-w600 mb-1">{{ title }}</h2>
    {% if subtitle %}
    <p class="mb-0 text-muted">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if actions %}
  <div class="d-flex align-items-center gap-2">{{ actions }}</div>
  {% endif %}
</div>
