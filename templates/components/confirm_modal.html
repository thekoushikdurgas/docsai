<div
  class="modal-overlay"
  id="confirmModal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="confirmModalTitle"
>
  <div class="modal-card modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="confirmModalTitle">Confirm Action</h2>
      <button
        type="button"
        class="modal-close"
        data-modal-close="confirmModal"
        aria-label="Close"
      >
        &times;
      </button>
    </div>
    <div class="modal-body">
      {% include "components/alert.html" with type="warning" message="" %}
      <p id="confirmModalMessage" style="margin: 0; color: var(--color-text)">
        Are you sure you want to proceed?
      </p>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-outline-secondary"
        data-modal-close="confirmModal"
      >
        Cancel
      </button>
      <form id="confirmModalForm" method="post" action="" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" id="confirmModalSubmit">
          Confirm
        </button>
      </form>
    </div>
  </div>
</div>
