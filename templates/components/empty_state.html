{% comment %} title, message, icon_class optional (lni-*) {% endcomment %}
<div class="text-center py-5 px-3">
  <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light mb-3" style="width: 4rem; height: 4rem;">
    <i class="lni {{ icon_class|default:'lni-folder' }} text-primary" style="font-size: 1.75rem;" aria-hidden="true"></i>
  </span>
  <h5 class="font-weight-semibold text-dark">{{ title|default:"Nothing here" }}</h5>
  {% if message %}<p class="text-muted small mb-0 mt-2">{{ message }}</p>{% endif %}
</div>
