{% comment %}
  label, value, format: mono|date|default text
{% endcomment %}
<div class="list-group-item d-flex justify-content-between align-items-start border-left-0 border-right-0 px-0 kv-row">
  <span class="text-muted small text-uppercase font-weight-medium mr-3">{{ label }}</span>
  <span class="text-right text-dark {% if format == 'mono' %}font-monospace small{% endif %}">
    {% if format == "date" and value %}{{ value }}{% else %}{{ value|default:"—" }}{% endif %}
  </span>
</div>
