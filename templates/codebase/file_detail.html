{% extends "base.html" %}
{% block title %}File{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">File</h1>
  <p class="page-subtitle"><code>{{ file_path }}</code></p>
  <a
    href="{% url 'codebase:file_list' analysis_id=analysis_id %}"
    class="btn btn-outline"
    >Files</a
  >
</div>
<pre class="card card-body" style="overflow: auto; max-height: 70vh">
{{ content|default:"—" }}</pre
>
{% endblock %}
